<!DOCTYPE html>

</head>

<body>

    <div class="container">

        <!-- Left Content -->
        <div class="left">
            <h1>Welcome to My Website</h1>
            <p>
                This is a simple example of dividing a page into two sections.

            </p>
            <button>Learn More</button>
        </div>

        <!-- Right Image -->

            <img src="berry.webp" alt="Sample Image">
        </div>

    </div>

</body>
